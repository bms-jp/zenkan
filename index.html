<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanri System — 賃貸管理</title>

<!-- ====== Security Hardening ======
  CSP: defense-in-depth against XSS / clickjacking / mixed content.
  Note: 'unsafe-eval' and 'unsafe-inline' are required for @babel/standalone
  to transpile JSX at runtime. These constraints disappear when migrating to
  a Vite build (V3 backend integration phase).
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  img-src 'self' data:;
  connect-src 'self' https://api.anthropic.com https:;
  object-src 'none';
  base-uri 'self';
  form-action 'none';
  frame-ancestors 'none';
">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- ====== Pinned CDN scripts with Subresource Integrity ======
  Hashes computed from npm-published react@18.3.1, react-dom@18.3.1,
  @babel/standalone@7.29.4. If unpkg serves modified content, browsers
  will refuse to execute (verified by openssl dgst -sha384).
-->
<script crossorigin
        src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
        integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"></script>
<script crossorigin
        src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
        integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"></script>
<script crossorigin
        src="https://unpkg.com/@babel/standalone@7.29.4/babel.min.js"
        integrity="sha384-qVgGRi0TCdh+xrBD9+4kG0YlkbOkWu2J3CB46EekpYQmtM96n9v+uaKIS5ipaqKb"></script>

<style>
/* ============================================================
   Kanri System V3 — Clear SaaS Design
   Compatible with V2.2 class names (no JSX changes required)
   ============================================================ */

:root {
  /* Surfaces */
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --surface-2: #F1F5F9;
  --surface-hover: #F1F5F9;

  /* Text */
  --ink: #0F172A;
  --ink-2: #334155;
  --muted: #64748B;
  --muted-2: #94A3B8;

  /* Borders */
  --border: #E2E8F0;
  --border-strong: #CBD5E1;

  /* Brand & accents */
  --accent: #2563EB;
  --accent-hover: #1D4ED8;
  --accent-soft: #EFF6FF;
  --accent-border: #BFDBFE;

  --success: #16A34A;
  --success-soft: #DCFCE7;
  --success-border: #BBF7D0;

  --warning: #F59E0B;
  --warning-soft: #FEF3C7;
  --warning-border: #FDE68A;

  --danger: #DC2626;
  --danger-soft: #FEE2E2;
  --danger-border: #FECACA;

  --info: #2563EB;
  --info-soft: #EFF6FF;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 1px 2px -1px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 10px 25px -5px rgba(15, 23, 42, 0.12), 0 4px 6px -4px rgba(15, 23, 42, 0.06);

  /* Radius */
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 14px;

  /* Fonts */
  --font-display: 'Plus Jakarta Sans', 'Noto Sans JP', system-ui, sans-serif;
  --font-body: 'Noto Sans JP', 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-num: 'Plus Jakarta Sans', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
#root { min-height: 100vh; }

/* ====== Layout ====== */
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 12px 40px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Brand block */
.brand {
  padding: 4px 12px 24px;
  margin-bottom: 12px;
}
.brand-mark {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  text-transform: none;
}
.brand-mark::before {
  content: "K";
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0;
}
.brand-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.2;
}
.brand-subtitle {
  font-size: 10px;
  color: var(--muted-2);
  margin-top: 4px;
  letter-spacing: 0.1em;
  font-weight: 600;
}

/* Nav */
.nav-section-label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted-2);
  padding: 14px 12px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  color: var(--ink-2);
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
  user-select: none;
  border-left: none;
  margin: 1px 0;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
  border-left: none;
}
.nav-glyph {
  width: 22px;
  height: 22px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  color: var(--muted);
  border-radius: 6px;
  flex-shrink: 0;
}
.nav-item.active .nav-glyph {
  background: var(--accent);
  color: white;
}
.nav-count {
  margin-left: auto;
  font-family: var(--font-num);
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  background: var(--surface-2);
  padding: 1px 7px;
  border-radius: 9px;
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-count { background: white; color: var(--accent); }

/* Main */
.main { padding: 28px 36px 80px; min-width: 0; }
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 0;
  margin-bottom: 24px;
  gap: 20px;
  flex-wrap: wrap;
  border-bottom: none;
}
.page-title-block { min-width: 0; }
.page-kicker {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted-2);
  margin-bottom: 4px;
}
.page-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.2;
}
.page-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}
.page-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

/* ====== Buttons ====== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--surface-2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}
.btn-ghost {
  background: transparent;
  border-color: transparent;
  padding: 6px 10px;
  color: var(--muted);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--ink); }
.btn-danger {
  color: var(--danger);
  border-color: var(--danger-border);
  background: var(--surface);
}
.btn-danger:hover:not(:disabled) {
  background: var(--danger-soft);
  border-color: var(--danger);
  color: var(--danger);
}
.btn-success {
  color: var(--success);
  border-color: var(--success-border);
  background: var(--surface);
}
.btn-success:hover:not(:disabled) {
  background: var(--success-soft);
  border-color: var(--success);
}
.btn-sm { padding: 6px 10px; font-size: 12px; }

/* ====== Search & filters ====== */
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  min-width: 240px;
}
.search-box input {
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  width: 100%;
  color: var(--ink);
}
.search-box input::placeholder { color: var(--muted-2); }
.search-icon { color: var(--muted-2); font-size: 14px; }

.filter-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.chip {
  display: inline-flex;
  align-items: center;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
}
.chip:hover { background: var(--surface-2); color: var(--ink); }
.chip.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.chip-count {
  margin-left: 6px;
  font-size: 10px;
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
  font-family: var(--font-num);
}

/* ====== Cards & tables ====== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card + .card { margin-top: 16px; }
.card-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
.card-head-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.card-body { padding: 20px; }
.table-wrap { overflow-x: auto; }

table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data thead th {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  text-align: left;
  padding: 11px 16px;
  font-weight: 700;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-family: var(--font-display);
  white-space: nowrap;
}
table.data tbody td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--ink-2);
  vertical-align: middle;
}
table.data tbody tr:last-child td { border-bottom: none; }
table.data tbody tr { transition: background 0.1s; }
table.data tbody tr:hover { background: var(--surface-2); }
table.data .col-actions { text-align: right; white-space: nowrap; }
table.data .col-num {
  font-variant-numeric: tabular-nums;
  text-align: right;
  font-family: var(--font-num);
  font-weight: 600;
}
table.data .primary-cell { color: var(--ink); font-weight: 600; }
table.data .primary-cell .sub {
  display: block;
  font-size: 11px;
  color: var(--muted-2);
  font-weight: 400;
  margin-top: 2px;
}
table.data tr.total-row td {
  background: var(--surface-2);
  font-weight: 700;
  color: var(--ink);
}

/* Empty state */
.empty { padding: 64px 20px; text-align: center; color: var(--muted); }
.empty-glyph {
  font-family: var(--font-display);
  font-size: 44px;
  color: var(--border-strong);
  margin-bottom: 8px;
  display: block;
}
.empty-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 6px;
}
.empty-text { font-size: 12px; color: var(--muted); }

/* ====== Badges (status pills) ====== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: var(--surface-2);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
  line-height: 1.4;
}
.badge::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.badge-success {
  background: var(--success-soft);
  color: var(--success);
  border-color: var(--success-border);
}
.badge-warning {
  background: var(--warning-soft);
  color: var(--warning);
  border-color: var(--warning-border);
}
.badge-danger {
  background: var(--danger-soft);
  color: var(--danger);
  border-color: var(--danger-border);
}
.badge-info {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-border);
}
.badge-neutral {
  background: var(--surface-2);
  color: var(--muted);
  border-color: var(--border);
}

/* ====== Modal ====== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 20px;
  z-index: 100;
  overflow-y: auto;
  animation: fadeIn 0.15s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: slideUp 0.2s ease-out;
  overflow: hidden;
}
.modal.lg { max-width: 920px; }
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.modal-kicker {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted-2);
  margin-bottom: 4px;
}
.modal-close {
  background: transparent;
  border: none;
  font-size: 20px;
  color: var(--muted);
  cursor: pointer;
  width: 32px; height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  line-height: 1;
}
.modal-close:hover { background: var(--surface-2); color: var(--ink); }
.modal-body { padding: 20px 24px; max-height: calc(100vh - 240px); overflow-y: auto; }
.modal-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  align-items: center;
}
.confirm { max-width: 460px; }
.confirm .modal-body p { font-size: 13px; line-height: 1.7; color: var(--ink-2); }

/* ====== Form ====== */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.full { grid-column: 1 / -1; }
.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  letter-spacing: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-label .req {
  color: var(--danger);
  font-size: 10px;
  font-weight: 700;
}
.form-input, .form-select, .form-textarea {
  padding: 9px 12px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-section-title {
  grid-column: 1 / -1;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  padding-top: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.form-section-title::before {
  content: "";
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}
.form-section-title:not(:first-child) { margin-top: 8px; }
.form-help { font-size: 11px; color: var(--muted); margin-top: 2px; }
.form-readonly-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--ink-2);
}

/* ====== Stats (KPI cards) ====== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--accent);
}
.stat.warn::before { background: var(--warning); }
.stat.success::before { background: var(--success); }
.stat.danger::before { background: var(--danger); }
.stat-label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.stat-value {
  font-family: var(--font-num);
  font-size: 30px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
}
.stat-unit {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  margin-left: 3px;
  font-family: var(--font-num);
}
.stat-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ====== Dashboard cards ====== */
.dash-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 1100px) { .dash-row { grid-template-columns: 1fr; } }
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.dash-card-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.dash-card-title .meta {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Occupancy bar */
.occupancy-bar {
  display: flex;
  height: 12px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface-2);
  margin: 12px 0 8px;
  border: 1px solid var(--border);
}
.occupancy-seg.occupied { background: var(--success); }
.occupancy-seg.vacant { background: var(--muted-2); }
.occupancy-seg.listed { background: var(--warning); }
.legend-row {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
  flex-wrap: wrap;
  font-weight: 500;
}
.legend-dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ====== Charts ====== */
.chart-wrap { width: 100%; overflow-x: auto; }
.chart-wrap svg { display: block; }
.chart-tick { fill: var(--muted); font-size: 10px; font-family: var(--font-num); font-weight: 600; }
.chart-line { fill: none; stroke: var(--accent); stroke-width: 2.5; }
.chart-area { fill: var(--accent); opacity: 0.1; }
.chart-bar { fill: var(--accent); }
.chart-grid { stroke: var(--border); stroke-dasharray: 2 3; }

/* ====== Audit log ====== */
.log-list { display: flex; flex-direction: column; }
.log-item {
  display: grid;
  grid-template-columns: 150px 100px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  align-items: baseline;
  font-size: 13px;
}
.log-item:last-child { border-bottom: none; }
.log-time {
  font-family: var(--font-num);
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.log-summary { color: var(--ink-2); }

/* ====== Key-value grid ====== */
.kv-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 18px;
  font-size: 13px;
}
.kv-grid dt {
  color: var(--muted);
  font-size: 12px;
  align-self: center;
  font-weight: 500;
}
.kv-grid dd { color: var(--ink); font-weight: 600; }

/* ====== Banner ====== */
.banner {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent-border);
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--ink-2);
}
.banner.success {
  background: var(--success-soft);
  border-color: var(--success-border);
  border-left-color: var(--success);
}
.banner.warn {
  background: var(--warning-soft);
  border-color: var(--warning-border);
  border-left-color: var(--warning);
}
.banner.info {
  background: var(--accent-soft);
  border-color: var(--accent-border);
  border-left-color: var(--accent);
}

/* ====== Misc ====== */
.row-link {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  cursor: pointer;
  font-weight: 600;
}
.row-link:hover { border-bottom-color: var(--accent); }
.muted { color: var(--muted); }
.tabular { font-variant-numeric: tabular-nums; font-family: var(--font-num); }

.footer-credit {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted-2);
  text-align: center;
  font-family: var(--font-display);
  font-weight: 600;
}

@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
  .main { padding: 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .log-item { grid-template-columns: 1fr; gap: 4px; }
}
</style>
</head>
